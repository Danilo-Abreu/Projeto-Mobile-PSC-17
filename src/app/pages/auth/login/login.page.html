<ion-content class="ion-padding">

  <h2>Login</h2>

  <!-- Mensagem de erro -->
  <ion-text *ngIf="errorMessage" color="danger" class="error-message">
    {{ errorMessage }}
  </ion-text>

  <ion-item>
    <ion-label position="floating">Email *</ion-label>
    <ion-input [(ngModel)]="email" placeholder="seu@email.com" type="email" required></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Senha *</ion-label>
    <ion-input [(ngModel)]="senha" placeholder="Digite sua senha" type="password" required></ion-input>
  </ion-item>

  <ion-button
    expand="block"
    (click)="entrar()"
    [disabled]="!isFormValid() || isLoading"
    class="login-button">
    <span *ngIf="isLoading">Entrando...</span>
    <span *ngIf="!isLoading">Entrar</span>
  </ion-button>

  <ion-button expand="block" routerLink="/register" fill="outline" class="register-button">
    Criar conta
  </ion-button>

</ion-content>
