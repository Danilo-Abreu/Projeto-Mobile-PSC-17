<!-- src/app/pages/agendamento/proximas-consultas/proximas-consultas.page.html -->
<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/perfil-paciente"></ion-back-button>
    </ion-buttons>
    <ion-title>Próximas Consultas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Seus Próximos Agendamentos</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-list *ngIf="agendamentos$ | async as agendamentos; else noUpcomingAppointments">
        <ion-item-sliding *ngFor="let agendamento of agendamentos">
          <ion-item>
            <ion-label>
              <h2>{{ formatarDataHora(agendamento.dataHora) }} com {{ agendamento.psicologoEmail }}</h2>
              <p>Duração: {{ agendamento.duracaoMinutos }} min</p>
              <p>Status: <strong>{{ agendamento.status }}</strong></p>
              <p *ngIf="agendamento.observacoes">Obs: {{ agendamento.observacoes }}</p>
            </ion-label>
          </ion-item>

          <ion-item-options side="end">
            <ion-item-option color="danger" (click)="cancelarAgendamento(agendamento.id!)">
              <ion-icon slot="icon-only" name="close-circle"></ion-icon>
              Cancelar
            </ion-item-option>
          </ion-item-options>
        </ion-item-sliding>
      </ion-list>

      <ng-template #noUpcomingAppointments>
        <ion-item>
          <ion-label>Você não possui agendamentos futuros.</ion-label>
        </ion-item>
      </ng-template>
    </ion-card-content>
  </ion-card>
</ion-content>
