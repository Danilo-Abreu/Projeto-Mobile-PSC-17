<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="home"></ion-back-button>
    </ion-buttons>
    <ion-title>Encontrar Psicólogo</ion-title>
  </ion-toolbar>
  <ion-toolbar color="primary">
    <ion-searchbar 
      placeholder="Buscar por nome ou especialidade" 
      (ionInput)="onSearchChange($event)"
      debounce="500">
    </ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Spinner de Carregamento -->
  <div *ngIf="isLoading" class="ion-text-center ion-padding">
    <ion-spinner name="crescent"></ion-spinner>
    <p>Buscando informações na API...</p>
  </div>

  <!-- Lista de Psicólogos -->
  <ion-list *ngIf="!isLoading">
    <ion-item *ngFor="let psicologo of psicologos" (click)="verDetalhes(psicologo.id)" button detail="true">
      <ion-avatar slot="start">
        <img [src]="psicologo.fotoUrl || 'assets/image.png'" />
      </ion-avatar>
      <ion-label>
        <h2>{{ psicologo.nome }}</h2>
        <p>{{ psicologo.especialidade }}</p>
        <ion-note color="primary">{{ psicologo.valorConsulta | currency:'BRL' }}</ion-note>
      </ion-label>
    </ion-item>
  </ion-list>

  <!-- Mensagem se não encontrar nada -->
  <div *ngIf="!isLoading && psicologos.length === 0" class="ion-text-center ion-padding">
    <ion-icon name="search-outline" style="font-size: 48px; color: var(--ion-color-step-400);"></ion-icon>
    <p>Nenhum psicólogo encontrado para sua busca.</p>
  </div>
</ion-content>
